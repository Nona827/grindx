<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="screen-refresh-rate" content="120">
<style>
  /* force 120hz where supported */
  @media (prefers-reduced-motion: no-preference) {
    * { scroll-behavior: smooth; }
  }
</style>
<title>GRINDX — Premium Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   GRINDX — DESIGN TOKENS
   Dark futuristic theme with neon accents, glassmorphism
================================================================ */
:root {
  /* Core backgrounds */
  --bg:           #08090f;
  --bg2:          #0d0f18;
  --surface:      rgba(255,255,255,0.04);
  --surface2:     rgba(255,255,255,0.07);
  --glass:        rgba(10,12,20,0.78);
  --glass2:       rgba(14,16,26,0.88);

  /* Borders */
  --border:       rgba(255,255,255,0.08);
  --border2:      rgba(255,255,255,0.14);
  --border-glow:  rgba(0,212,255,0.3);

  /* Neon accents — Bold Masculine: Electric Orange / Cyan / Red */
  --neon-blue:    #00cfff;           /* electric cyan */
  --neon-blue-dim:rgba(0,207,255,0.12);
  --neon-blue-glow:rgba(0,207,255,0.35);
  --neon-purple:  #ff4500;           /* deep orange-red */
  --neon-purple-dim:rgba(255,69,0,0.12);
  --neon-purple-glow:rgba(255,69,0,0.3);
  --neon-green:   #00e676;           /* vivid green */
  --neon-green-dim:rgba(0,230,118,0.1);
  --neon-green-glow:rgba(0,230,118,0.3);
  --neon-pink:    #ff3d00;           /* fiery red-orange */
  --neon-pink-dim:rgba(255,61,0,0.12);
  --neon-pink-glow:rgba(255,61,0,0.35);
  --neon-orange:  #ff6d00;
  --neon-orange-dim:rgba(255,109,0,0.12);
  --neon-orange-glow:rgba(255,109,0,0.3);
  --neon-gold:    #ffab00;
  --neon-gold-dim:rgba(255,171,0,0.12);

  /* Kept from original for JS compatibility */
  --green:        #00e676;
  --green-dim:    rgba(0,230,118,0.1);
  --green-glow:   rgba(0,230,118,0.3);
  --red:          #ff3d00;
  --yellow:       #ffab00;
  --orange:       #ff6d00;
  --orange-dim:   rgba(255,109,0,0.12);
  --orange-glow:  rgba(255,109,0,0.3);
  --blue:         #00cfff;
  --text:         #f0f0ff;
  --muted:        rgba(255,255,255,0.45);
  --muted2:       rgba(255,255,255,0.22);

  /* Metric palette */
  --sets-color:   #00cfff;           /* cyan — Sets */
  --sets-dim:     rgba(0,207,255,0.12);
  --sets-glow:    rgba(0,207,255,0.28);
  --reps-color:   #00e676;           /* green — Reps */
  --reps-dim:     rgba(0,230,118,0.12);
  --reps-glow:    rgba(0,230,118,0.28);
  --weight-color: #ff6d00;           /* orange — Weight */
  --weight-dim:   rgba(255,109,0,0.12);
  --weight-glow:  rgba(255,109,0,0.28);
  --dur-color:    #ffab00;           /* amber — Duration */
  --dur-dim:      rgba(255,171,0,0.12);
  --dur-glow:     rgba(255,171,0,0.28);

  /* Premium */
  --pr-pink:      #ff3d00;
  --pr-pink-dim:  rgba(255,61,0,0.12);
  --pr-pink-glow: rgba(255,61,0,0.35);
  --purple:       #00cfff;
  --purple-dim:   rgba(0,207,255,0.12);
  --purple-glow:  rgba(0,207,255,0.28);
  --recovery-fresh: #00e676;
  --recovery-mod:   #ffab00;
  --recovery-sore:  #ff3d00;

  /* Layout */
  --radius:     16px;
  --radius-sm:  10px;
  --radius-xs:  7px;

  /* ── Card Style Customization (controlled by JS) ── */
  --card-opacity:     0.88;          /* glass alpha: 0.0–1.0 */
  --card-blur:        16px;          /* backdrop-filter blur */
  --card-shadow:      0 4px 24px rgba(0,0,0,0.35);
  --card-radius:      16px;          /* overrides --radius for cards */
  --card-border-alpha:0.10;          /* border opacity multiplier context */
  --card-glow-alpha:  0.0;           /* extra glow ring on cards */
  --card-solid-bg:    rgba(14,16,26,0.96); /* used in solid mode */
  --card-mode:        glass;         /* "glass" | "solid" */
}

/* ================================================================
   THEMES — applied to <html> via data-theme attribute
================================================================ */

/* 1. GRINDX (default — already in :root, nothing to override) */

/* Apply green-tinted card style for GRIND CLASSIC */
[data-theme="grind-classic"] .today-header {
  background: linear-gradient(135deg, rgba(0,30,22,0.95) 0%, rgba(5,15,10,0.98) 100%);
}
[data-theme="grind-classic"] .btn-start,
[data-theme="grind-classic"] .btn-finish,
[data-theme="grind-classic"] .btn-save {
  background: #00d4aa !important;
  color: #000 !important;
  box-shadow: 0 4px 20px rgba(0,212,170,0.35);
}
[data-theme="grind-classic"] .nav-logo {
  background: linear-gradient(135deg, #00d4aa, #00ffcc);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
[data-theme="grind-classic"] body::after {
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(0,212,170,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(255,140,0,0.05) 0%, transparent 60%);
}
[data-theme="grind-classic"] .workout-badge.badge-a { background: linear-gradient(135deg,#ff6b35,#ff9500); }
[data-theme="grind-classic"] .workout-badge.badge-b { background: linear-gradient(135deg,#00d4aa,#00ffcc); }
[data-theme="grind-classic"] .recovery-card { border-color: rgba(0,212,170,0.2); }

/* ================================================================
   PREMIUM THEME PACKS SECTION
================================================================ */
.premium-pack-section {
  margin-bottom: 18px;
}
.premium-pack-label {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase; color:var(--muted);
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.premium-pack-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.premium-badge {
  font-size:8px; font-weight:800; letter-spacing:1px;
  background:linear-gradient(135deg,#ff6d00,#ffd600);
  color:#000; padding:2px 7px; border-radius:4px;
}

/* ================================================================
   UI FX CONTROLS PANEL
================================================================ */
.fx-controls {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 16px; margin-bottom: 12px;
}
.fx-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.fx-row:last-child { border-bottom: none; }
.fx-label {
  font-size: 12px; font-weight: 600; color: var(--text);
}
.fx-sub {
  font-size: 10px; color: var(--muted); margin-top: 1px;
}
.fx-toggle {
  position: relative; width: 44px; height: 24px; cursor: pointer;
}
.fx-toggle input { opacity:0; width:0; height:0; }
.fx-slider {
  position: absolute; inset: 0;
  background: var(--surface2); border-radius: 12px; border: 1px solid var(--border2);
  transition: all 0.3s;
}
.fx-slider::before {
  content: ''; position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  left: 2px; top: 2px;
  background: var(--muted); transition: all 0.3s;
}
.fx-toggle input:checked + .fx-slider {
  background: var(--neon-blue-dim); border-color: var(--neon-blue);
}
.fx-toggle input:checked + .fx-slider::before {
  transform: translateX(20px); background: var(--neon-blue);
  box-shadow: 0 0 8px var(--neon-blue-glow);
}

/* Range slider for blur/animation intensity */
.fx-range {
  -webkit-appearance: none; width: 100px; height: 4px;
  background: var(--surface2); border-radius: 2px; outline: none;
  border: 1px solid var(--border2);
}
.fx-range::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: var(--neon-blue);
  cursor: pointer; box-shadow: 0 0 6px var(--neon-blue-glow);
}

/* ================================================================
   BACKUP & RESTORE
================================================================ */
.backup-card {
  background:var(--card-glass-bg, var(--glass)); border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius)); padding:18px 20px; margin-bottom:8px;
  backdrop-filter:blur(var(--card-blur, 12px));
  box-shadow: var(--card-shadow);
}
.backup-row {
  display:flex; align-items:center; justify-content:space-between; gap:14px;
}
.backup-info { flex:1; }
.backup-title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:3px; }
.backup-sub { font-size:11px; color:var(--muted); line-height:1.5; }
.btn-export {
  padding:10px 18px; border-radius:var(--card-radius, 10px);
  background:linear-gradient(135deg,var(--neon-blue-dim),rgba(0,207,255,0.18));
  border:1.5px solid var(--neon-blue); color:var(--neon-blue);
  font-size:11px; font-weight:700; letter-spacing:1px; white-space:nowrap;
  transition:all 0.2s; font-family:'Orbitron',sans-serif;
}
.btn-export:hover { background:var(--neon-blue); color:#000; box-shadow:0 0 16px var(--neon-blue-glow); }
.btn-import {
  padding:10px 18px; border-radius:var(--card-radius, 10px);
  background:linear-gradient(135deg,var(--neon-green-dim),rgba(0,230,118,0.18));
  border:1.5px solid var(--neon-green); color:var(--neon-green);
  font-size:11px; font-weight:700; letter-spacing:1px; white-space:nowrap;
  transition:all 0.2s; font-family:'Orbitron',sans-serif;
}
.btn-import:hover { background:var(--neon-green); color:#000; box-shadow:0 0 16px var(--neon-green-glow); }
.backup-meta {
  font-size:10px; color:var(--muted); margin-top:10px; padding-top:10px;
  border-top:1px solid var(--border); display:flex; align-items:center; gap:6px;
}
.backup-meta-dot { width:6px; height:6px; border-radius:50%; background:var(--neon-green); flex-shrink:0; }
#backupFileInput { display:none; }

/* Backup confirm overlay */
.backup-confirm-sheet {
  background:var(--glass2); border-top:1px solid var(--border2);
  border-radius:22px 22px 0 0; width:100%; max-width:520px;
  padding:28px 24px 48px; animation:slideUp 0.35s cubic-bezier(.32,0,.15,1) both;
}
.backup-checklist { display:flex; flex-direction:column; gap:8px; margin:16px 0 20px; }
.backup-check-item {
  display:flex; align-items:center; gap:12px;
  background:var(--surface2); border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; font-size:13px; color:var(--text);
}
.backup-check-icon { font-size:16px; flex-shrink:0; }
.backup-check-label { flex:1; }
.backup-check-status { font-size:10px; font-weight:700; color:var(--neon-green); letter-spacing:1px; }

/* Card style preset buttons */
.cs-preset-btn {
  font-size:10px; font-weight:700; letter-spacing:0.5px;
  padding:8px 4px; border-radius:8px; text-align:center;
  background:var(--surface2); border:1.5px solid var(--border2);
  color:var(--muted); cursor:pointer; transition:all 0.2s;
}
.cs-preset-btn:hover { border-color:var(--neon-blue); color:var(--neon-blue); }
.cs-preset-btn.active { background:var(--neon-blue-dim); border-color:var(--neon-blue); color:var(--neon-blue); }

/* Wallpaper grid */
/* Accent color picker row */
.accent-picker-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
}
.accent-dot {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s;
}
.accent-dot:hover { transform: scale(1.15); }
.accent-dot.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.4); }

/* Auto mode toggle pill */
.auto-mode-pill {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
  cursor: pointer; transition: all 0.2s;
}
.auto-mode-pill:hover { border-color: var(--neon-blue); }
.auto-mode-pill.active { border-color: var(--neon-blue); background: var(--neon-blue-dim); }
.auto-mode-icon { font-size: 18px; }
.auto-mode-info { flex: 1; }
.auto-mode-title { font-size: 12px; font-weight: 700; color: var(--text); }
.auto-mode-sub { font-size: 10px; color: var(--muted); }
.auto-mode-status {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--neon-blue); text-transform: uppercase;
}

/* Glow intensity preview ring */
.glow-preview {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--neon-blue-dim);
  border: 2px solid var(--neon-blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 8px var(--neon-blue-glow); }
  50% { box-shadow: 0 0 24px var(--neon-blue-glow), 0 0 48px var(--neon-blue-dim); }
}

/* ================================================================
   GLOW EFFECTS ENHANCEMENT
================================================================ */
body.glow-intense .nav-logo {
  filter: drop-shadow(0 0 12px var(--neon-blue-glow));
  animation: logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow {
  0%,100% { filter: drop-shadow(0 0 8px var(--neon-blue-glow)); }
  50% { filter: drop-shadow(0 0 22px var(--neon-blue-glow)); }
}
body.glow-intense .nav-tab.active,
body.glow-intense .bottom-tab.active {
  box-shadow: 0 0 18px var(--neon-blue-glow) !important;
  text-shadow: 0 0 8px var(--neon-blue-glow);
}
body.glow-intense .ex-card.done {
  box-shadow: 0 0 20px var(--neon-green-glow), 0 2px 12px rgba(0,0,0,0.4) !important;
}
body.glow-intense .ex-card {
  box-shadow: 0 0 10px var(--neon-blue-dim), 0 2px 12px rgba(0,0,0,0.3) !important;
}
body.glow-intense .btn-start {
  box-shadow: 0 0 30px rgba(255,109,0,0.6), 0 0 60px rgba(0,207,255,0.25) !important;
  animation: btnPulse 2s ease-in-out infinite;
}
@keyframes btnPulse {
  0%,100% { box-shadow: 0 0 20px rgba(255,109,0,0.4), 0 0 40px rgba(0,207,255,0.15); }
  50% { box-shadow: 0 0 45px rgba(255,109,0,0.8), 0 0 90px rgba(0,207,255,0.35); }
}
body.glow-intense .stat-card,
body.glow-intense .today-card,
body.glow-intense .recovery-card {
  box-shadow: 0 0 14px var(--neon-blue-dim), 0 2px 16px rgba(0,0,0,0.3) !important;
}
body.glow-intense .hero-banner {
  box-shadow: 0 0 30px var(--neon-blue-dim), 0 4px 20px rgba(0,0,0,0.4) !important;
}
body.glow-intense .pr-badge,
body.glow-intense .set-chip.done {
  box-shadow: 0 0 10px var(--neon-green-glow) !important;
}
body.glow-intense .card {
  box-shadow: 0 0 12px var(--neon-blue-dim) !important;
}
/* ================================================================
   CARD STYLE MODES — solid vs glass + glow ring
================================================================ */
/* Solid mode: cards are opaque, no blur needed */
body.card-solid .ex-card,
body.card-solid .card,
body.card-solid .today-card,
body.card-solid .stat-card,
body.card-solid .history-item,
body.card-solid .workout-header,
body.card-solid .nut-card,
body.card-solid .bmi-display,
body.card-solid .recovery-card,
body.card-solid .coach-insight-card {
  background: var(--card-solid-bg) !important;
  backdrop-filter: none !important;
}

/* Glow ring on cards */
body.card-glow .ex-card,
body.card-glow .card,
body.card-glow .today-card,
body.card-glow .stat-card,
body.card-glow .history-item,
body.card-glow .workout-header {
  box-shadow: var(--card-shadow), 0 0 18px var(--neon-blue-dim) !important;
}

/* 120hz — promote key animated elements to their own GPU layer */
@keyframes hz120 { 0%,100% { opacity: 0.9999999; } }
html { animation: hz120 0.008s infinite step-end; }

/* Promote animated elements to GPU compositing layers for 120hz */
.ex-card, .stat-card, .today-card, .card, .history-item,
.progress-bar-fill, .rest-bar-fill, .src-bar-fill,
.bottom-tab, .theme-swatch, #particleCanvas {
  will-change: transform;
}

/* Force high-refresh-rate rendering hint for supported browsers */
@media (prefers-reduced-motion: no-preference) {
  :root { scroll-behavior: smooth; }
}


body.glow-intense input:focus,
body.glow-intense .sheet-input:focus,
body.glow-intense .ctb-input:focus {
  box-shadow: 0 0 12px var(--neon-blue-glow) !important;
  border-color: var(--neon-blue) !important;
}
/* Glow on active bottom tab icon */
body.glow-intense .bottom-tab.active .tab-icon {
  filter: drop-shadow(0 0 6px var(--neon-blue-glow)) !important;
  animation: tabIconPulse 2.5s ease-in-out infinite;
}
@keyframes tabIconPulse {
  0%,100% { filter: drop-shadow(0 0 4px var(--neon-blue-glow)); }
  50% { filter: drop-shadow(0 0 12px var(--neon-blue-glow)); }
}

/* ================================================================
   ANIMATION MODES — FIXED: now clearly different
================================================================ */
body.anim-reduced * {
  animation-duration: 0.01ms !important;
  transition-duration: 0.05s !important;
}

/* Smooth mode: rich spring transitions + visible hover lifts */
body.anim-smooth .ex-card {
  transition: transform 0.35s cubic-bezier(.22,1,.36,1),
              border-color 0.35s ease,
              box-shadow 0.35s cubic-bezier(.22,1,.36,1) !important;
}
body.anim-smooth .ex-card:hover {
  transform: translateX(5px) !important;
}
body.anim-smooth .stat-card,
body.anim-smooth .today-card,
body.anim-smooth .card {
  transition: transform 0.3s cubic-bezier(.22,1,.36,1),
              box-shadow 0.3s ease !important;
}
body.anim-smooth .stat-card:hover {
  transform: translateY(-5px) scale(1.03) !important;
  box-shadow: 0 12px 32px rgba(0,0,0,0.4) !important;
}
body.anim-smooth .theme-swatch {
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1),
              border-color 0.25s ease,
              box-shadow 0.3s ease !important;
}
body.anim-smooth .theme-swatch:hover {
  transform: scale(1.1) translateY(-4px) !important;
}
body.anim-smooth .bottom-tab {
  transition: color 0.2s ease, transform 0.2s cubic-bezier(.22,1,.36,1) !important;
}
body.anim-smooth .bottom-tab:active {
  transform: scale(0.9) !important;
}
body.anim-smooth .set-btn {
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1),
              background 0.2s ease, border-color 0.2s ease !important;
}
body.anim-smooth .set-btn:active {
  transform: scale(0.88) !important;
}
body.anim-smooth .page {
  animation: smoothPageIn 0.4s cubic-bezier(.22,1,.36,1) both !important;
}
@keyframes smoothPageIn {
  from { opacity:0; transform:translateY(20px) scale(0.98); }
  to   { opacity:1; transform:translateY(0)    scale(1); }
}

/* ================================================================
   ANIMATED GRADIENT BG THEMES
================================================================ */
body.bg-animated::before {
  animation: bgDrift 12s ease-in-out infinite alternate !important;
}
@keyframes bgDrift {
  from { background-position: 0% 0%, 100% 100%; }
  to { background-position: 50% 50%, 50% 50%; }
}

/* Moving gradient orbs */
body.bg-orbs::after {
  animation: orbsMove 15s ease-in-out infinite alternate !important;
}
@keyframes orbsMove {
  0% { background-position: 15% 10%, 85% 85%; }
  33% { background-position: 80% 20%, 20% 70%; }
  66% { background-position: 30% 80%, 70% 10%; }
  100% { background-position: 15% 10%, 85% 85%; }
}

/* ================================================================
   AUTO DARK/LIGHT INDICATOR
================================================================ */
.auto-mode-indicator {
  position: fixed; top: 66px; right: 12px; z-index: 200;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 3px 8px; color: var(--muted);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.auto-mode-indicator.show { opacity: 1; }

/* Light mode */
body.light-mode {
  --bg:           #f0f2f8;
  --bg2:          #e8eaf4;
  --surface:      rgba(0,0,0,0.04);
  --surface2:     rgba(0,0,0,0.07);
  --glass:        rgba(240,242,255,0.85);
  --glass2:       rgba(230,232,250,0.92);
  --border:       rgba(0,0,30,0.1);
  --border2:      rgba(0,0,30,0.18);
  --text:         #0d0d1a;
  --muted:        rgba(0,0,30,0.5);
  --muted2:       rgba(0,0,30,0.3);
}

/* ================================================================
   CUSTOM THEME FULL EDIT OVERLAY
================================================================ */
#editThemeOverlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.88); backdrop-filter:blur(14px);
  display:none; align-items:flex-end; justify-content:center;
}
#editThemeOverlay.show { display:flex; animation:fadeIn 0.2s ease; }
.edit-theme-sheet {
  background:var(--glass2); border-top:1px solid var(--border2);
  border-radius:22px 22px 0 0; width:100%; max-width:520px;
  max-height:90vh; overflow-y:auto; padding:22px 20px 44px;
  animation:slideUp 0.35s cubic-bezier(.32,0,.15,1) both;
}
.edit-theme-sheet::-webkit-scrollbar { width:3px; }
.edit-theme-sheet::-webkit-scrollbar-thumb { background:var(--neon-blue-dim); border-radius:2px; }

/* Custom background section */
.custom-bg-section {
  margin-top: 8px;
}
.custom-bg-preview {
  width:100%; height:80px; border-radius:12px; object-fit:cover;
  border:1px solid var(--border2); margin-top:8px; display:none;
}
.custom-bg-preview.show { display:block; }
.bg-options-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px;
}
.bg-option-btn {
  padding:10px 6px; border-radius:10px; border:1.5px solid var(--border2);
  background:var(--surface2); font-size:11px; font-weight:700; color:var(--muted);
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.bg-option-btn:hover { border-color:var(--neon-blue); color:var(--neon-blue); }
.bg-option-btn.active { background:var(--neon-blue-dim); border-color:var(--neon-blue); color:var(--neon-blue); }
/* hidden file input */
#bgFileInput { display:none; }
html {
  transition: none;
}
body, body::before, body::after,
.top-nav, .card, .ex-card, .today-card,
.hero-banner, .stat-card, .recovery-card,
.theme-swatch, .coach-hero, .profile-hub {
  transition: background 0.5s cubic-bezier(.4,0,.2,1),
              border-color 0.5s cubic-bezier(.4,0,.2,1),
              box-shadow 0.5s cubic-bezier(.4,0,.2,1),
              color 0.4s ease;
}

/* ================================================================
   PARTICLE CANVAS — global overlay for particle effects
================================================================ */
#particleCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
body.particles-on #particleCanvas { opacity: 1; }

/* ================================================================
   ANIMATED GRADIENT BG — for premium themes
================================================================ */
#animBgCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0;
  transition: opacity 1s ease;
}
body.anim-bg-on #animBgCanvas { opacity: 1; }

/* ================================================================
   THEME-SPECIFIC ANIMATED BODY EFFECTS
================================================================ */

/* Neon Rage — scanline flicker */
[data-theme="neon-rage"] body::before,
html[data-theme="neon-rage"] body::before {
  background-image:
    repeating-linear-gradient(0deg, rgba(255,0,200,0.03) 0px, transparent 2px, transparent 4px),
    linear-gradient(rgba(255,0,200,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,200,0.02) 1px, transparent 1px);
  background-size: 100% 4px, 60px 60px, 60px 60px;
  animation: scanlines 3s linear infinite;
}
@keyframes scanlines { from{background-position:0 0,0 0,0 0;} to{background-position:0 60px,0 0,0 0;} }

/* AMOLED — pure black grid */
html[data-theme="amoled"] body::before {
  background-image:
    linear-gradient(rgba(0,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* Anime Mode — subtle sparkle dots */
html[data-theme="anime"] body::before {
  background-image:
    radial-gradient(circle, rgba(255,112,200,0.04) 1px, transparent 1px),
    radial-gradient(circle, rgba(96,216,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px, 60px 60px;
  background-position: 0 0, 20px 20px;
  animation: animeFloat 8s ease-in-out infinite alternate;
}
@keyframes animeFloat { from{background-position:0 0,20px 20px;} to{background-position:10px 10px,30px 30px;} }

/* Crimson — heat distortion shimmer */
html[data-theme="crimson"] body::after {
  background:
    radial-gradient(ellipse 70% 40% at 20% 20%, rgba(255,32,32,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,102,0,0.06) 0%, transparent 60%);
  animation: crimsonPulse 4s ease-in-out infinite alternate;
}
@keyframes crimsonPulse {
  from { opacity: 1; }
  to { opacity: 0.5; }
}

/* Midnight Gold — golden shimmer */
html[data-theme="midnight-gold"] body::after {
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,184,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 100%, rgba(184,134,11,0.06) 0%, transparent 60%);
  animation: goldShimmer 6s ease-in-out infinite alternate;
}
@keyframes goldShimmer {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

/* Cyber Blue — flowing data streams */
html[data-theme="cyber-blue"] body::before {
  background-image:
    linear-gradient(rgba(0,170,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,170,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(0,255,238,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,238,0.02) 1px, transparent 1px);
  background-size: 60px 60px, 60px 60px, 20px 20px, 20px 20px;
  animation: cyberGrid 20s linear infinite;
}
@keyframes cyberGrid { from{background-position:0 0,0 0,0 0,0 0;} to{background-position:0 60px,0 0,0 20px,0 0;} }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}
body.light-mode::before { background-image: none; }

/* Ambient glow orbs */
body::after {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(255,109,0,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(0,207,255,0.06) 0%, transparent 60%);
  pointer-events:none;
}
body.light-mode::after { display:none; }

button { cursor:pointer; font-family:inherit; border:none; outline:none; }
input, select, textarea { font-family:inherit; outline:none; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--neon-blue-dim); border-radius:2px; }

/* ================================================================
   TOP NAV — glassmorphism
================================================================ */
.top-nav {
  position:sticky; top:0; z-index:100;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items:center; justify-content:space-between;
  height: 58px;
}
.nav-logo {
  font-family:'Orbitron',sans-serif;
  font-size:22px; font-weight:900; letter-spacing:4px;
  background: linear-gradient(135deg, #ff6d00, #00cfff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.nav-right { display:flex; align-items:center; gap:8px; }
.nav-tabs { display:flex; gap:3px; }
.nav-tab {
  background:none; color:var(--muted);
  font-size:11px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; padding:6px 12px; border-radius:8px; transition:all 0.2s;
}
.nav-tab:hover { color:var(--text); background:var(--surface2); }
.nav-tab.active {
  color:var(--neon-blue);
  background:var(--neon-blue-dim);
  box-shadow: 0 0 12px var(--neon-blue-glow);
}

/* Theme toggle button */
.theme-toggle {
  width:36px; height:36px; border-radius:10px;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--text); font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.theme-toggle:hover { border-color:var(--neon-blue); box-shadow:0 0 10px var(--neon-blue-glow); }

/* ================================================================
   THEME PANEL OVERLAY
================================================================ */
#themePanelOverlay {
  display:none; position:fixed; inset:0; z-index:250;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(12px);
  align-items:flex-end; justify-content:center;
}
#themePanelOverlay.show { display:flex !important; animation:fadeIn 0.2s ease; }
.theme-panel-sheet {
  background:var(--glass2); border-top:1px solid var(--border2);
  border-radius:24px 24px 0 0; padding:16px 18px 100px;
  width:100%; max-width:680px;
  animation:slideUp 0.35s cubic-bezier(.32,0,.15,1) both;
  max-height:88vh; overflow-y:auto;
}
.theme-panel-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.theme-panel-title {
  font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; letter-spacing:2px; color:var(--text);
}
.theme-panel-close {
  width:34px; height:34px; border-radius:50%;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--muted); font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.theme-panel-close:hover { color:var(--text); border-color:var(--border2); }
.tp-section-label {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.tp-active-lbl { font-size:11px; color:var(--muted); margin-top:6px; text-align:center; }

/* Custom themes list */
.custom-theme-item {
  display:flex; align-items:center; gap:10px;
  background:var(--glass); border:1px solid var(--border2);
  border-radius:12px; padding:12px 14px; margin-bottom:8px;
  transition:all 0.2s;
}
.custom-theme-item:hover { border-color:var(--border2); }
.custom-theme-swatch {
  width:44px; height:44px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:20px;
  border:2px solid transparent; transition:all 0.2s;
}
.custom-theme-swatch.active { border-color:#fff; box-shadow:0 0 0 3px rgba(255,255,255,0.2); }
.custom-theme-info { flex:1; min-width:0; }
.custom-theme-name { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.custom-theme-sub { font-size:10px; color:var(--muted); margin-top:1px; }
.custom-theme-actions { display:flex; gap:5px; flex-shrink:0; }
.cta-btn {
  font-size:10px; font-weight:700; letter-spacing:0.5px;
  padding:5px 10px; border-radius:7px; transition:all 0.2s;
}
.cta-apply  { background:var(--neon-blue-dim); border:1px solid var(--neon-blue); color:var(--neon-blue); }
.cta-apply:hover  { background:var(--neon-blue); color:#000; }
.cta-apply.applied { background:var(--neon-blue); color:#000; }
.cta-rename { background:var(--surface2); border:1px solid var(--border2); color:var(--muted); }
.cta-rename:hover { border-color:var(--neon-gold); color:var(--neon-gold); }
.cta-delete { background:rgba(255,61,0,0.1); border:1px solid rgba(255,61,0,0.3); color:var(--red); }
.cta-delete:hover { background:rgba(255,61,0,0.2); border-color:var(--red); }
.custom-themes-empty { text-align:center; padding:20px; color:var(--muted); font-size:12px; }

/* Custom theme builder */
.custom-theme-builder {
  background:var(--glass); border:1px solid var(--border);
  border-radius:14px; padding:16px 18px; margin-bottom:6px;
}
.ctb-name-row { display:flex; gap:8px; margin-bottom:14px; }
.ctb-input {
  background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:8px; padding:10px 12px; font-size:14px; color:var(--text);
  transition:all 0.2s;
}
.ctb-input:focus { border-color:var(--neon-blue); box-shadow:0 0 0 2px var(--neon-blue-dim); outline:none; }
.ctb-colors-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.ctb-color-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.ctb-color-field { display:flex; flex-direction:column; gap:4px; }
.ctb-clr-lbl { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.ctb-clr-hint { font-size:9px; font-weight:400; letter-spacing:0; text-transform:none; color:var(--muted2); display:block; margin-top:1px; }
.ctb-clr-row { display:flex; align-items:center; gap:8px; }
.ctb-color-input {
  width:40px; height:36px; border-radius:8px; border:2px solid var(--border2);
  cursor:pointer; padding:2px; background:none;
}
.ctb-clr-val { font-size:11px; font-weight:600; color:var(--muted); font-family:monospace; }
.ctb-preview-btn {
  flex:1; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px;
  padding:10px; border-radius:8px; background:var(--surface2); border:1px solid var(--border2);
  color:var(--muted); transition:all 0.2s;
}
.ctb-preview-btn:hover { border-color:var(--neon-blue); color:var(--neon-blue); }
.ctb-save-btn {
  flex:2; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px;
  padding:10px; border-radius:8px;
  background:linear-gradient(135deg,#ff6d00,#00cfff); color:#000; transition:all 0.2s;
}
.ctb-save-btn:hover { box-shadow:0 0 18px rgba(255,109,0,0.4); transform:translateY(-1px); }

/* Rename inline for custom theme */
.custom-rename-row {
  display:flex; gap:6px; margin-bottom:8px;
  background:rgba(0,207,255,0.06); border:1px solid var(--neon-blue-dim);
  border-radius:10px; padding:8px 12px;
}
.custom-rename-input {
  flex:1; background:transparent; border:none; font-size:14px; font-weight:600;
  color:var(--text);
}
.custom-rename-input:focus { outline:none; }
.custom-rename-save {
  font-size:10px; font-weight:700; letter-spacing:1px; padding:5px 12px;
  border-radius:7px; background:var(--neon-blue); color:#000; transition:all 0.2s;
}
.custom-rename-save:hover { box-shadow:0 0 10px var(--neon-blue-glow); }

/* ================================================================
   PAGES
================================================================ */
.page { display:none; padding:24px 18px 110px; max-width:680px; margin:0 auto; position:relative; z-index:1; }
.page.active { display:block; animation:pageIn 0.35s cubic-bezier(.22,1,.36,1) both; }
@keyframes pageIn {
  from { opacity:0; transform:translateY(18px) scale(0.99); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ================================================================
   TYPOGRAPHY
================================================================ */
.page-title {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(28px,6vw,44px); font-weight:900; letter-spacing:2px; line-height:1; margin-bottom:4px;
}
.page-title span { color:var(--neon-blue); }
.page-sub { font-size:13px; color:var(--muted); margin-bottom:28px; letter-spacing:0.3px; }
.section-label {
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; color:var(--muted); margin-bottom:12px; margin-top:28px;
}

/* ================================================================
   GLASS CARD
================================================================ */
.card {
  background: var(--card-glass-bg, var(--glass));
  border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius)); padding:20px;
  backdrop-filter:blur(var(--card-blur, 16px));
  box-shadow: var(--card-shadow);
}
.card + .card { margin-top:12px; }

/* ================================================================
   HOME PAGE
================================================================ */
.hero-banner {
  position:relative; overflow:hidden;
  border-radius:var(--card-radius, 20px); padding:28px 24px 24px;
  background: var(--card-glass-bg, linear-gradient(135deg, rgba(255,109,0,0.08) 0%, rgba(0,207,255,0.08) 100%));
  border:1px solid var(--border2);
  margin-bottom:18px;
  backdrop-filter:blur(var(--card-blur, 0px));
  box-shadow: var(--card-shadow);
}
.hero-banner::before {
  content:'';
  position:absolute; top:-40px; right:-40px;
  width:180px; height:180px; border-radius:50%;
  background: radial-gradient(circle, rgba(255,109,0,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.hero-eyebrow {
  font-family:'Orbitron',sans-serif;
  font-size:10px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; color:var(--neon-blue); margin-bottom:6px;
}
.hero-greeting {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(22px,5vw,32px); font-weight:900; letter-spacing:1px; line-height:1.15; margin-bottom:4px;
}
.hero-greeting .accent { color:var(--neon-green); }
.hero-date { font-size:12px; color:var(--muted); margin-bottom:18px; }

.stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:18px; }
.stat-card {
  background:var(--card-glass-bg, var(--surface));
  border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius)); padding:16px 14px; text-align:center;
  transition:all 0.2s;
  box-shadow: var(--card-shadow);
}
.stat-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.stat-val {
  font-family:'Orbitron',sans-serif; font-size:28px; font-weight:900;
  background:linear-gradient(135deg, #ff6d00, #00cfff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1;
}
.stat-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-top:5px; }

.motive-card {
  background:var(--card-glass-bg, linear-gradient(135deg, rgba(0,255,136,0.06), rgba(0,212,255,0.06)));
  border:1px solid rgba(0,255,136,0.15);
  border-radius:var(--card-radius, var(--radius)); padding:16px 18px;
  font-size:13px; color:rgba(200,255,230,0.85); line-height:1.65; margin-bottom:16px;
  box-shadow: var(--card-shadow);
}
.motive-card strong {
  color:var(--neon-green); display:block;
  font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px;
}

.today-card {
  background:var(--card-glass-bg, var(--glass));
  border:1px solid var(--border2);
  border-radius:var(--card-radius, 20px); overflow:hidden; margin-bottom:16px;
  backdrop-filter:blur(var(--card-blur, 16px));
  box-shadow: var(--card-shadow);
}
.today-header {
  background:linear-gradient(135deg, rgba(255,109,0,0.08), rgba(0,207,255,0.06));
  border-bottom:1px solid var(--border);
  padding:20px; display:flex; align-items:center; justify-content:space-between;
}
.today-badge {
  font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px;
  padding:4px 12px; border-radius:6px; color:#000; text-transform:uppercase;
}
.today-title {
  font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; letter-spacing:0.5px; margin-top:5px;
}
.today-meta { font-size:12px; color:var(--muted); margin-top:3px; }

.progress-wrap { padding:16px 20px; border-bottom:1px solid var(--border); }
.progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.progress-label { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1.5px; }
.progress-pct {
  font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900;
  color:var(--neon-green);
}
.progress-bar-bg {
  height:5px; background:var(--surface2); border-radius:3px; overflow:hidden;
}
.progress-bar-fill {
  height:100%;
  background:linear-gradient(90deg, var(--neon-blue), var(--neon-green));
  border-radius:3px;
  transition:width 0.6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px var(--neon-green-glow);
}

.btn-start {
  display:block; width:calc(100% - 40px); margin:16px 20px;
  background:linear-gradient(135deg, #ff6d00, #00cfff);
  color:#000; font-family:'Orbitron',sans-serif; font-size:14px;
  font-weight:700; letter-spacing:2px; padding:15px; border-radius:var(--card-radius, 12px);
  transition:all 0.25s; text-align:center;
  box-shadow: 0 0 20px rgba(255,109,0,0.35);
}
.btn-start:hover { transform:translateY(-2px); box-shadow:0 0 36px rgba(255,109,0,0.5), 0 4px 20px rgba(0,0,0,0.4); }

.next-session-card {
  background:var(--card-glass-bg, var(--surface)); border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius)); padding:16px 18px; margin-bottom:14px;
  box-shadow: var(--card-shadow);
}
.next-session-eyebrow { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:5px; }
.next-session-name { font-weight:700; font-size:14px; }
.next-session-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* Recovery on home */
.home-recovery { margin-bottom:16px; }

/* ================================================================
   WORKOUT PAGE
================================================================ */
.workout-header {
  display:flex; align-items:center; gap:14px; margin-bottom:18px;
  padding:16px 18px;
  background:var(--card-glass-bg, var(--glass)); border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius)); backdrop-filter:blur(var(--card-blur, 16px));
  box-shadow: var(--card-shadow);
}
.workout-badge {
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:2px; padding:5px 14px; border-radius:8px; color:#000;
}
.badge-a {
  background:linear-gradient(135deg,#ff6b35,#ff8c35);
  box-shadow:0 0 14px rgba(255,107,53,0.4);
}
.badge-b {
  background:linear-gradient(135deg,#00ff88,#00d4a0);
  box-shadow:0 0 14px rgba(0,255,136,0.4);
}
.workout-title-block { flex:1; }
.workout-main-title {
  font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900; letter-spacing:1px;
}
.workout-meta-lbl { font-size:11px; color:var(--muted); margin-top:2px; }
.live-dur-block { text-align:right; }
.live-dur-val {
  font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700;
  color:var(--neon-gold);
}
.live-dur-lbl { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

.workout-progress-wrap { margin-bottom:18px; }

/* Muscle group divider */
.muscle-divider {
  display:flex; align-items:center; gap:10px; margin:20px 0 10px;
}
.muscle-divider-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  box-shadow:0 0 6px currentColor;
}
.muscle-divider-lbl {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase; color:var(--muted);
  white-space:nowrap;
}
.muscle-divider-line { flex:1; height:1px; background:var(--border); }
.muscle-divider-rename {
  font-size:10px; font-weight:600; background:none; color:var(--muted2);
  border:1px solid var(--border); border-radius:var(--radius-xs, 5px); padding:2px 8px;
  transition:all 0.2s; white-space:nowrap; cursor:pointer;
}
.muscle-divider-rename:hover { color:var(--neon-gold, #ffd600); border-color:var(--neon-gold, #ffd600); }
.muscle-divider-add {
  font-size:15px; font-weight:900; line-height:1;
  background:rgba(0,207,255,0.12); color:var(--neon-blue, #00cfff);
  border:1px solid var(--neon-blue, #00cfff);
  border-radius:var(--radius-xs, 5px); padding:2px 9px;
  transition:all 0.2s; white-space:nowrap; cursor:pointer; flex-shrink:0;
}
.muscle-divider-add:hover {
  background:var(--neon-blue, #00cfff); color:#000;
  box-shadow:0 0 10px rgba(0,207,255,0.45);
}

/* ================================================================
   EXERCISE CARD — glassmorphism
================================================================ */
.ex-card {
  background:var(--card-glass-bg, var(--glass));
  border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius)); margin-bottom:10px; overflow:hidden;
  transition:border-color 0.25s, box-shadow 0.25s, transform 0.15s;
  animation:exSlideIn 0.3s ease both;
  backdrop-filter:blur(var(--card-blur, 12px));
  box-shadow: var(--card-shadow);
}
@keyframes exSlideIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.ex-card.removing { animation:exSlideOut 0.25s ease forwards; }
@keyframes exSlideOut {
  to { opacity:0; transform:translateX(-20px); max-height:0; margin-bottom:0; }
}
.ex-card.done {
  border-color:var(--neon-green);
  box-shadow:0 0 0 1px var(--neon-green-dim), 0 0 20px rgba(0,255,136,0.06);
}
.ex-card.done .ex-header { background:rgba(0,255,136,0.04); }
.ex-card.editing { border-color:var(--neon-blue); box-shadow:0 0 0 1px var(--neon-blue-dim); }
.ex-card.timer-active { border-color:var(--neon-orange); box-shadow:0 0 0 1px var(--neon-orange-dim); }
.ex-card.timer-active .ex-header { background:rgba(255,107,53,0.05); }
.ex-card.has-pr {
  border-color:var(--neon-pink) !important;
  box-shadow:0 0 0 1px var(--neon-pink-dim), 0 0 24px rgba(255,63,163,0.1) !important;
}
.ex-card.has-pr .ex-header { background:rgba(255,63,163,0.04); }

.ex-header {
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; cursor:pointer; user-select:none; transition:background 0.15s;
}
.ex-header:hover { background:var(--surface2); }

.ex-num {
  font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700;
  color:var(--muted2); min-width:20px;
}
.ex-card.done .ex-num { color:var(--neon-green); }
.ex-card.timer-active .ex-num { color:var(--neon-orange); }

.ex-info { flex:1; min-width:0; }
.ex-name-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.ex-title { font-size:14px; font-weight:700; letter-spacing:0.2px; }
.ex-added {
  font-size:9px; background:var(--neon-green); color:#000;
  font-weight:700; padding:1px 6px; border-radius:4px; letter-spacing:0.5px;
}

.ex-chips { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
.ex-chip {
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:5px;
  background:var(--surface2); color:var(--muted); border:1px solid var(--border2);
  transition:all 0.2s; letter-spacing:0.3px;
}
.chip-sets    { color:var(--sets-color)!important;   border-color:rgba(180,77,255,0.3)!important; }
.chip-reps    { color:var(--reps-color)!important;   border-color:rgba(0,212,255,0.3)!important; }
.chip-weight  { color:var(--weight-color)!important; border-color:rgba(255,107,53,0.3)!important; }
.chip-duration{ color:var(--dur-color)!important;    border-color:rgba(255,214,10,0.25)!important; }

.ex-actions { display:flex; gap:6px; flex-shrink:0; }
.ex-btn {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:all 0.15s;
  border:1px solid var(--border2); background:var(--surface);
}
.ex-btn:hover { border-color:var(--neon-blue); background:var(--neon-blue-dim); box-shadow:0 0 8px var(--neon-blue-glow); }
.ex-btn.del:hover { border-color:var(--red); background:rgba(255,77,77,0.1); color:var(--red); }
.ex-check {
  width:30px; height:30px; border-radius:50%;
  border:2px solid var(--border2); display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all 0.25s; flex-shrink:0; background:none; color:transparent;
}
.ex-card.done .ex-check {
  background:var(--neon-green); border-color:var(--neon-green); color:#000;
  box-shadow:0 0 14px var(--neon-green-glow);
}

.ex-body { display:none; border-top:1px solid var(--border); }
.ex-card.open .ex-body { display:block; }

/* Edit panel */
.edit-panel {
  padding:14px 16px 0;
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  background:rgba(0,212,255,0.03);
  border-bottom:1px solid var(--border);
}
.edit-field { display:flex; flex-direction:column; gap:4px; padding-bottom:14px; }
.edit-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--neon-blue); }
.edit-lbl.lbl-sets   { color:var(--sets-color); }
.edit-lbl.lbl-reps   { color:var(--reps-color); }
.edit-lbl.lbl-weight { color:var(--weight-color); }
.edit-lbl.lbl-dur    { color:var(--dur-color); }
.edit-input {
  background:var(--surface2); border:1.5px solid rgba(0,212,255,0.2);
  border-radius:8px; padding:9px 10px; font-size:14px; font-weight:600; color:var(--text);
  width:100%; transition:all 0.2s; -moz-appearance:textfield;
}
.edit-input::-webkit-outer-spin-button,.edit-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.edit-input:focus { border-color:var(--neon-blue); background:var(--neon-blue-dim); box-shadow:0 0 0 2px var(--neon-blue-glow); }
.edit-field.field-sets   .edit-input:focus { border-color:var(--sets-color);   background:var(--sets-dim);   box-shadow:0 0 0 2px var(--sets-glow); }
.edit-field.field-reps   .edit-input:focus { border-color:var(--reps-color);   background:var(--reps-dim);   box-shadow:0 0 0 2px var(--reps-glow); }
.edit-field.field-weight .edit-input:focus { border-color:var(--weight-color); background:var(--weight-dim); box-shadow:0 0 0 2px var(--weight-glow); }
.edit-field.field-dur    .edit-input:focus { border-color:var(--dur-color);    background:var(--dur-dim);    box-shadow:0 0 0 2px var(--dur-glow); }
.edit-save-row { grid-column:1/-1; padding-bottom:12px; }
.btn-edit-save {
  width:100%; background:linear-gradient(135deg,#ff6d00,#00cfff); color:#000;
  font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px;
  padding:11px; border-radius:8px; transition:all 0.2s;
}
.btn-edit-save:hover { box-shadow:0 0 20px rgba(255,109,0,0.4); transform:translateY(-1px); }

/* Set buttons */
.sets-area { padding:12px 16px 8px; }
.sets-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(74px,1fr)); gap:8px; }
.set-btn {
  background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:10px; padding:10px 6px;
  font-size:11px; font-weight:700; color:var(--muted);
  transition:all 0.2s; text-align:center;
}
.set-btn:hover { border-color:var(--sets-color); color:var(--text); transform:scale(1.04); box-shadow:0 0 12px var(--sets-glow); }
.set-btn:active { transform:scale(0.96); }
.set-btn.set-done {
  background:var(--sets-dim); border-color:var(--sets-color); color:var(--sets-color);
  box-shadow:0 0 10px var(--sets-glow);
}
.set-lbl { font-size:9px; color:var(--muted2); margin-bottom:3px; text-transform:uppercase; letter-spacing:1px; }
.set-reps { font-family:'Orbitron',sans-serif; font-size:15px; font-weight:700; line-height:1; }

/* Tip */
.ex-tip-row {
  margin:8px 16px 14px;
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:9px 12px; font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:flex-start;
}

/* ================================================================
   EXERCISE TIMER BLOCK
================================================================ */
.ex-timer-block {
  margin:0 16px 12px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:12px; overflow:hidden;
}
.ex-timer-inner { padding:14px 16px; display:flex; align-items:center; gap:14px; }
.ex-timer-ring-wrap { position:relative; width:64px; height:64px; flex-shrink:0; }
.ex-timer-svg { width:64px; height:64px; transform:rotate(-90deg); }
.ex-timer-track { fill:none; stroke:var(--border2); stroke-width:4; }
.ex-timer-prog {
  fill:none; stroke:var(--neon-orange); stroke-width:4;
  stroke-linecap:round; transition:stroke-dashoffset 0.25s linear, stroke 0.3s;
}
.ex-timer-prog.done-color { stroke:var(--neon-green); }
.ex-timer-text {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px;
  color:var(--neon-orange); transition:color 0.3s;
}
.ex-timer-text.done-color { color:var(--neon-green); }
.ex-timer-info { flex:1; }
.ex-timer-label { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.ex-timer-duration-row { display:flex; align-items:center; gap:6px; }
.ex-timer-dur-badge { font-family:'Orbitron',sans-serif; font-size:17px; font-weight:700; color:var(--neon-orange); }
.ex-timer-bar-wrap { height:3px; background:var(--border); }
.ex-timer-bar-fill { height:100%; background:var(--neon-orange); transition:width 0.25s linear; }
.ex-timer-controls { padding:10px 16px 14px; display:flex; gap:8px; }
.btn-timer {
  flex:1; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:1.5px; padding:10px; border-radius:8px; transition:all 0.2s;
}
.btn-timer-start { background:var(--neon-orange); color:#000; }
.btn-timer-start:hover { box-shadow:0 0 16px var(--neon-orange-glow); transform:translateY(-1px); }
.btn-timer-pause { background:var(--surface2); border:1px solid var(--border2); color:var(--text); }
.btn-timer-pause:hover { border-color:var(--neon-orange); color:var(--neon-orange); }
.btn-timer-skip { background:var(--surface2); border:1px solid var(--border2); color:var(--muted); flex:0 0 auto; padding:10px 14px; }
.btn-timer-skip:hover { border-color:var(--red); color:var(--red); }

/* ================================================================
   REST TIMER BANNER — fixed top
================================================================ */
#rest-banner {
  display:none; position:fixed;
  top:58px; left:0; right:0; z-index:90;
  background:rgba(255,107,53,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,150,80,0.3);
  animation:restSlideDown 0.4s cubic-bezier(.32,0,.15,1) both;
}
#rest-banner.show { display:block; }
@keyframes restSlideDown {
  from { transform:translateY(-100%); opacity:0; }
  to   { transform:translateY(0); opacity:1; }
}
.rest-banner-inner { max-width:680px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; }
.rest-icon { font-size:22px; flex-shrink:0; animation:restPulse 1.5s ease-in-out infinite; }
@keyframes restPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
.rest-info { flex:1; }
.rest-label { font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700; letter-spacing:2px; color:rgba(0,0,0,0.7); }
.rest-countdown { font-family:'Orbitron',sans-serif; font-size:26px; font-weight:900; letter-spacing:2px; color:#000; line-height:1; }
.rest-bar-bg { height:3px; background:rgba(0,0,0,0.2); border-radius:2px; margin-top:4px; overflow:hidden; }
.rest-bar-fill { height:100%; background:#000; border-radius:2px; transition:width 0.25s linear; }
.rest-controls { display:flex; gap:6px; flex-shrink:0; }
.btn-rest {
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px;
  padding:7px 12px; border-radius:6px; background:rgba(0,0,0,0.2); color:#000; transition:all 0.15s;
}
.btn-rest:hover { background:rgba(0,0,0,0.35); }
body.rest-active .page.active { padding-top:0; }
#page-workout { transition:padding-top 0.3s; }

/* ================================================================
   RENAME SECTION MODAL
================================================================ */
#renameModal {
  display:none; position:fixed; inset:0; z-index:250;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(12px);
  align-items:center; justify-content:center; padding:20px;
}
#renameModal.show { display:flex; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.rename-box {
  background:var(--glass2); border:1px solid var(--border2);
  border-radius:20px; padding:28px 24px; width:100%; max-width:360px;
  animation:popIn 0.3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
.rename-title { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; letter-spacing:2px; color:var(--text); margin-bottom:16px; }
.rename-title span { color:var(--neon-blue); }
.rename-input {
  width:100%; background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:8px; padding:12px 14px; font-size:15px; font-weight:600; color:var(--text);
  margin-bottom:14px; transition:all 0.2s;
}
.rename-input:focus { border-color:var(--neon-blue); box-shadow:0 0 0 2px var(--neon-blue-dim); }
.rename-btns { display:flex; gap:8px; }
.btn-rename-save {
  flex:1; background:linear-gradient(135deg,#ff6d00,#00cfff); color:#000;
  font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px;
  padding:12px; border-radius:8px; transition:all 0.2s;
}
.btn-rename-save:hover { box-shadow:0 0 20px rgba(255,109,0,0.4); }
.btn-rename-cancel {
  background:var(--surface2); border:1px solid var(--border2); color:var(--muted);
  font-size:13px; font-weight:600; padding:12px 16px; border-radius:8px; transition:all 0.2s;
}
.btn-rename-cancel:hover { color:var(--text); border-color:var(--border2); }

/* ================================================================
   ADD EXERCISE BUTTONS & MODALS
================================================================ */
.btn-add-ex {
  width:100%; margin-top:12px; margin-bottom:4px;
  background:none; border:1.5px dashed var(--border2); color:var(--muted);
  font-size:13px; font-weight:600; padding:14px; border-radius:var(--radius);
  transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-add-ex:hover { border-color:var(--neon-green); color:var(--neon-green); background:var(--neon-green-dim); box-shadow:0 0 12px var(--neon-green-glow); }
.btn-finish {
  width:100%; margin-top:16px;
  background:linear-gradient(135deg, #ff6d00, #00cfff);
  color:#000; font-family:'Orbitron',sans-serif; font-size:14px; font-weight:900;
  letter-spacing:2px; padding:16px; border-radius:var(--card-radius, 12px); transition:all 0.25s;
}
.btn-finish:hover { box-shadow:0 0 30px rgba(255,109,0,0.5); transform:translateY(-2px); }
.btn-finish:disabled { background:var(--surface2); color:var(--muted2); cursor:not-allowed; box-shadow:none; transform:none; }

/* ================================================================
   SELECT WORKOUT BUTTON
================================================================ */
.btn-select-workout {
  display:flex; align-items:center; gap:10px;
  width:100%; margin:12px 0 8px;
  background:var(--card-glass-bg, var(--glass));
  border:1.5px solid var(--border2);
  border-radius:var(--card-radius, 14px);
  padding:14px 18px;
  color:var(--text); cursor:pointer;
  backdrop-filter:blur(var(--card-blur,12px));
  transition:all 0.22s;
  box-shadow: var(--card-shadow);
}
.btn-select-workout:hover {
  border-color:var(--neon-blue);
  box-shadow:0 0 16px var(--neon-blue-glow);
}
.bsw-icon { font-size:18px; flex-shrink:0; }
.bsw-label {
  font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:2px; color:var(--muted); flex:1; text-align:left;
}
.bsw-current {
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:900;
  color:var(--neon-blue); letter-spacing:1px;
}
.bsw-arrow { font-size:20px; color:var(--muted); transform:rotate(90deg); }

/* ================================================================
   WORKOUT SELECTOR SHEET
================================================================ */
.wks-sheet {
  background:var(--glass2); border-top:1px solid var(--border2);
  border-radius:24px 24px 0 0; width:100%; max-width:680px;
  padding:14px 18px 100px; max-height:85vh; overflow-y:auto;
  animation:slideUp 0.35s cubic-bezier(.32,0,.15,1) both;
}
.wks-handle {
  width:40px; height:4px; background:var(--border2); border-radius:2px;
  margin:0 auto 16px;
}
.wks-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.wks-title {
  font-family:'Orbitron',sans-serif; font-size:16px; font-weight:900;
  letter-spacing:2px; color:var(--text);
}
.wks-close {
  width:32px; height:32px; border-radius:50%;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--muted); font-size:15px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; transition:all 0.2s;
}
.wks-close:hover { border-color:var(--neon-blue); color:var(--text); }
.wks-section-lbl {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase; color:var(--muted);
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.wks-section-lbl::after { content:''; flex:1; height:1px; background:var(--border); }
.wks-item {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:12px; padding:12px 14px; margin-bottom:8px;
  cursor:pointer; transition:all 0.2s;
}
.wks-item:hover { border-color:var(--border2); background:var(--surface2); }
.wks-item.active {
  border-color:var(--neon-blue);
  background:var(--neon-blue-dim);
  box-shadow:0 0 12px var(--neon-blue-glow);
}
.wks-item-badge {
  width:40px; height:40px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',sans-serif; font-size:16px; font-weight:900;
  background:var(--surface2);
}
.wks-item.active .wks-item-badge { background:var(--neon-blue); color:#000; }
.wks-item-info { flex:1; min-width:0; }
.wks-item-name {
  font-weight:700; font-size:14px; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.wks-item-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.wks-item-actions { display:flex; gap:5px; flex-shrink:0; }
.wks-act-btn {
  font-size:10px; font-weight:700; padding:5px 10px;
  border-radius:7px; transition:all 0.2s; cursor:pointer;
}
.wks-act-rename { background:var(--surface2); border:1px solid var(--border2); color:var(--muted); }
.wks-act-rename:hover { border-color:var(--neon-gold); color:var(--neon-gold); }
.wks-act-dup { background:var(--neon-blue-dim); border:1px solid var(--neon-blue); color:var(--neon-blue); }
.wks-act-dup:hover { background:var(--neon-blue); color:#000; }
.wks-act-del { background:rgba(255,61,0,0.1); border:1px solid rgba(255,61,0,0.3); color:var(--red); }
.wks-act-del:hover { background:rgba(255,61,0,0.2); }
.wks-actions {
  display:flex; gap:8px; flex-wrap:wrap; padding:6px 0 4px;
}
.wks-presets-grid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
}
.wks-preset-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; cursor:pointer;
  transition:all 0.2s;
}
.wks-preset-card:hover { border-color:var(--neon-orange); background:var(--surface2); }
.wks-preset-icon { font-size:22px; margin-bottom:5px; }
.wks-preset-name { font-size:12px; font-weight:700; color:var(--text); }
.wks-preset-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.wks-create-btn {
  display:block; width:100%; margin-top:14px; padding:13px;
  background:var(--surface2); border:1.5px dashed var(--border2);
  border-radius:12px; color:var(--muted);
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:1.5px; cursor:pointer; transition:all 0.2s;
}
.wks-create-btn:hover { border-color:var(--neon-green); color:var(--neon-green); }

.modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(12px);
  align-items:flex-end; justify-content:center; padding:0;
}
.modal-overlay.show { display:flex; animation:fadeIn 0.2s ease; }
.modal-sheet {
  background:var(--glass2); border-top:1px solid var(--border2);
  border-radius:24px 24px 0 0; padding:24px 20px 44px;
  width:100%; max-width:680px;
  animation:slideUp 0.3s cubic-bezier(.32,0,.15,1) both;
  max-height:92vh; overflow-y:auto;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 20px; }
.sheet-title { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; letter-spacing:2px; color:var(--text); margin-bottom:16px; }
.sheet-title span { color:var(--neon-green); }
.sheet-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.sheet-field { display:flex; flex-direction:column; gap:5px; }
.sheet-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
.sheet-input {
  background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:10px; padding:12px 14px; font-size:14px; color:var(--text);
  width:100%; transition:all 0.2s;
}
.sheet-input:focus { border-color:var(--neon-green); box-shadow:0 0 0 2px var(--neon-green-dim); }
.sheet-full { grid-column:1/-1; }
.btn-sheet-add {
  width:100%; margin-top:14px;
  background:linear-gradient(135deg,#ff6d00,#00cfff); color:#000;
  font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px;
  padding:15px; border-radius:12px; transition:all 0.2s;
}
.btn-sheet-add:hover { box-shadow:0 0 24px rgba(255,109,0,0.5); transform:translateY(-1px); }
.btn-sheet-cancel { width:100%; margin-top:8px; background:none; color:var(--muted); font-size:13px; font-weight:600; padding:12px; border-radius:10px; transition:color 0.2s; }
.btn-sheet-cancel:hover { color:var(--text); }

/* ================================================================
   PROFILE PAGE
================================================================ */
.profile-avatar {
  width:76px; height:76px;
  background:linear-gradient(135deg,rgba(255,109,0,0.15),rgba(0,207,255,0.15));
  border:2px solid #ff6d00; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:34px; margin-bottom:20px;
  box-shadow:0 0 20px rgba(255,109,0,0.35);
}
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.form-input {
  width:100%; background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:8px; padding:12px 14px; font-size:14px; color:var(--text); transition:all 0.2s;
}
.form-input:focus { border-color:var(--neon-green); box-shadow:0 0 0 2px var(--neon-green-dim); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.btn-save {
  width:100%; margin-top:8px;
  background:linear-gradient(135deg,#ff6d00,#00cfff); color:#000;
  font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px;
  padding:14px; border-radius:var(--card-radius, 12px); transition:all 0.2s;
}
.btn-save:hover { box-shadow:0 0 24px rgba(255,109,0,0.4); transform:translateY(-1px); }

.bmi-display {
  display:flex; align-items:stretch; background:var(--card-glass-bg, var(--glass));
  border:1px solid var(--border); border-radius:var(--card-radius, var(--radius)); overflow:hidden; margin-bottom:16px;
  box-shadow:var(--card-shadow);
}
.bmi-left { padding:20px; min-width:110px; display:flex; flex-direction:column; justify-content:center; }
.bmi-right { flex:1; padding:18px; border-left:1px solid var(--border); display:flex; align-items:center; font-size:13px; color:var(--muted); line-height:1.7; }
.bmi-val { font-family:'Orbitron',sans-serif; font-size:42px; font-weight:900; line-height:1; }
.bmi-val.underweight { color:var(--yellow); }
.bmi-val.normal      { color:var(--neon-green); }
.bmi-val.overweight  { color:var(--red); }
.bmi-label { font-size:10px; color:var(--muted); margin-top:4px; }
.bmi-status { font-size:13px; font-weight:700; margin-top:2px; }
.bmi-status.underweight { color:var(--yellow); }
.bmi-status.normal      { color:var(--neon-green); }
.bmi-status.overweight  { color:var(--red); }
.nut-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.nut-card { background:var(--card-glass-bg, var(--glass)); border:1px solid var(--border); border-radius:var(--card-radius, var(--radius)); padding:14px 16px; box-shadow:var(--card-shadow); }
.nut-val { font-family:'Orbitron',sans-serif; font-size:22px; font-weight:700; color:var(--neon-green); line-height:1; }
.nut-unit { font-size:10px; color:var(--muted); }
.nut-lbl { font-size:11px; font-weight:600; margin-top:4px; color:var(--muted); }

/* ================================================================
   HISTORY PAGE
================================================================ */
.history-empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
.history-empty .empty-icon { font-size:48px; margin-bottom:12px; }
.history-item {
  background:var(--card-glass-bg, var(--glass)); border:1px solid var(--border); border-radius:var(--card-radius, var(--radius));
  padding:16px 18px; margin-bottom:10px; display:flex; align-items:center; gap:14px;
  transition:all 0.2s; backdrop-filter:blur(var(--card-blur, 12px));
  box-shadow: var(--card-shadow);
}
.history-item:hover { border-color:var(--border2); transform:translateX(3px); }
.history-icon { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.history-icon.a { background:rgba(255,107,53,0.15); border:1px solid rgba(255,107,53,0.25); }
.history-icon.b { background:var(--neon-green-dim); border:1px solid rgba(0,255,136,0.2); }
.history-info { flex:1; }
.history-date { font-size:11px; color:var(--muted); }
.history-name { font-weight:700; font-size:14px; margin-top:1px; }
.history-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.history-pct {
  font-family:'Orbitron',sans-serif; font-size:20px; font-weight:900;
  color:var(--neon-green);
}
.btn-clear-history {
  width:100%; margin-top:16px; background:none;
  border:1px solid var(--red); color:var(--red);
  font-size:12px; font-weight:700; padding:12px; border-radius:8px;
  transition:all 0.2s; letter-spacing:0.5px;
}
.btn-clear-history:hover { background:rgba(255,77,77,0.1); box-shadow:0 0 12px rgba(255,77,77,0.2); }

/* ================================================================
   BOTTOM NAV — glassmorphism
================================================================ */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--glass); backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex; padding:8px 0 env(safe-area-inset-bottom,8px);
}
.bottom-tab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  background:none; color:var(--muted2); font-size:9px; font-weight:700;
  letter-spacing:0.8px; text-transform:uppercase; padding:6px 4px; transition:all 0.2s;
  position:relative;
}
.bottom-tab .tab-icon { font-size:20px; transition:transform 0.2s; }
.bottom-tab.active { color:var(--neon-blue); }
.bottom-tab.active .tab-icon { transform:translateY(-2px); filter:drop-shadow(0 0 6px var(--neon-blue)); }
.bottom-tab.active::after {
  content:''; position:absolute; bottom:2px;
  width:20px; height:2px; border-radius:1px;
  background:var(--neon-blue); box-shadow:0 0 8px var(--neon-blue);
}

/* ================================================================
   SETTINGS PAGE
================================================================ */
.settings-section { margin-bottom:28px; }
.settings-section .section-label { margin-top:0; }
.setting-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--card-glass-bg, var(--glass)); border:1px solid var(--border);
  border-radius:var(--card-radius, var(--radius-sm)); padding:14px 16px; margin-bottom:8px;
  backdrop-filter:blur(var(--card-blur, 12px));
  box-shadow: var(--card-shadow);
}
.setting-left { flex:1; }
.setting-title { font-size:14px; font-weight:600; margin-bottom:2px; }
.setting-sub { font-size:11px; color:var(--muted); }
.toggle-switch { position:relative; width:46px; height:26px; flex-shrink:0; }
.toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
.toggle-slider { position:absolute; inset:0; background:var(--border2); border-radius:13px; cursor:pointer; transition:all 0.25s; }
.toggle-slider::before {
  content:''; position:absolute;
  width:20px; height:20px; left:3px; top:3px;
  background:white; border-radius:50%; transition:transform 0.25s;
}
.toggle-switch input:checked + .toggle-slider { background:var(--neon-blue); box-shadow:0 0 10px var(--neon-blue-glow); }
.toggle-switch input:checked + .toggle-slider::before { transform:translateX(20px); }
.setting-input {
  width:72px; text-align:center;
  background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:6px; padding:8px 10px; font-size:14px; font-weight:700; color:var(--text);
}
.setting-input:focus { border-color:var(--neon-blue); }

/* ================================================================
   TOAST
================================================================ */
.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:var(--glass2); border:1px solid var(--border2);
  border-radius:99px; padding:10px 20px;
  font-size:13px; font-weight:600; white-space:nowrap; z-index:300;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
  backdrop-filter:blur(16px);
}
.toast.show { opacity:1; }

/* ================================================================
   PROGRESSIVE OVERLOAD BADGES
================================================================ */
.overload-row { display:flex; gap:5px; flex-wrap:wrap; padding:6px 16px 2px; }
.overload-badge {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:5px;
  letter-spacing:0.5px; display:flex; align-items:center; gap:3px;
  animation:badgePop 0.4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes badgePop {
  from { transform:scale(0.7); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.overload-badge.improve { background:var(--neon-green-dim); color:var(--neon-green); border:1px solid rgba(0,255,136,0.3); }
.overload-badge.pr {
  background:var(--neon-pink-dim); color:var(--neon-pink);
  border:1px solid rgba(255,63,163,0.35); box-shadow:0 0 10px var(--neon-pink-glow);
  animation:prPulse 2s ease-in-out infinite, badgePop 0.4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes prPulse {
  0%,100%{box-shadow:0 0 8px var(--neon-pink-glow);}
  50%{box-shadow:0 0 20px var(--neon-pink-glow), 0 0 40px var(--neon-pink-dim);}
}
.overload-badge.same { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

/* ================================================================
   NOTES SECTION
================================================================ */
.notes-area { padding:10px 16px 14px; border-top:1px solid var(--border); }
.notes-label { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--purple); margin-bottom:6px; display:flex; align-items:center; gap:5px; }
.notes-input {
  width:100%; background:var(--purple-dim); border:1.5px solid rgba(180,77,255,0.25);
  border-radius:8px; padding:10px 12px; font-size:13px; color:var(--text);
  resize:none; min-height:56px; font-family:'Inter',sans-serif; line-height:1.5;
  transition:all 0.2s;
}
.notes-input:focus { border-color:var(--purple); background:rgba(180,77,255,0.15); outline:none; box-shadow:0 0 0 2px var(--purple-dim); }
.notes-input::placeholder { color:var(--muted); }

/* ================================================================

================================================================ */
.superset-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  background:var(--purple-dim); color:var(--purple);
  border:1px solid rgba(180,77,255,0.3); padding:2px 8px; border-radius:4px;
}
.superset-connector { margin:4px 0 4px 20px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--purple); font-weight:600; }

.btn-superset { font-size:10px; background:var(--purple-dim); border:1px solid rgba(180,77,255,0.3); color:var(--purple); padding:4px 10px; border-radius:6px; transition:all 0.2s; font-weight:700; }
.btn-superset:hover { background:rgba(180,77,255,0.2); border-color:var(--purple); }

.superset-panel { padding:10px 16px 14px; border-top:1px solid var(--border); background:rgba(180,77,255,0.03); }
.superset-panel-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--purple); margin-bottom:8px; }
.superset-select { width:100%; background:var(--surface2); border:1.5px solid rgba(180,77,255,0.25); border-radius:8px; padding:9px 12px; font-size:13px; color:var(--text); font-family:'Inter',sans-serif; margin-bottom:8px; }
.superset-select:focus { border-color:var(--purple); outline:none; }
